[mypy]
python_version = 3.12
strict = True
strict_equality = True
extra_checks = True
allow_redefinition = True
implicit_reexport = True
enable_error_code = redundant-expr, possibly-undefined, truthy-bool, truthy-iterable, mutable-override, narrowed-type-not-subtype
warn_unreachable = True
warn_redundant_casts = True
